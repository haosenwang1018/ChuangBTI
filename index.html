<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChuangBTI · 创始人人格整活测试</title>
  <meta name="description" content="ChuangBTI · 创始人特供整活人格测评：创投圈脑回路、融资条款与联创日常一锅炖；与 MBTI 无关，开源娱乐向。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.85em' x='50%25' text-anchor='middle' font-size='72'%3EC%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <h1 class="intro-title" id="intro-title">ChuangBTI<br/>创始人整活人格</h1>
        <p class="intro-lead" id="intro-lead"></p>
        <button id="btn-start" class="btn btn-primary">开始测我的 ChuangBTI</button>
        <p class="intro-credit"> Remixed by <a href="https://ktwu01.github.io/" target="_blank">Koutian Wu @ SP1</a></p>
        <p class="intro-credit">开源项目 · 基于 B站UP主@蛆肉儿串儿 原创测试</p>
        <p class="intro-note">ChuangBTI 仅供娱乐 · 与 MBTI 无关</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 24</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker" id="result-kicker">你的创业者人格</div>
        <img id="result-image" class="result-image" alt="" />
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <h3 class="section-title" id="axis-section-title">你的 6 轴画像</h3>
        <canvas id="axis-chart"></canvas>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新测试</button>
        </div>

        <div class="agent-section">
          <p class="agent-title">想自己搭一个？</p>
          <div class="agent-cmd">
            <code>git clone https://github.com/haosenwang1018/ChuangBTI.git && cd ChuangBTI && npm install && npm run dev</code>
          </div>
          <button id="btn-agent" class="btn btn-agent">复制一键部署命令</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
